<script>
// ═══════════════════════════════════════════════════════════
// DATA STORE
// ═══════════════════════════════════════════════════════════
let rawWeb=[], rawExc=[], rawWin=[];
let loadedCount=0;
const PIE_PALETTE=['#f0a500','#e85d04','#3fb950','#58a6ff','#bc8cff','#f85149','#39c5cf','#ff6eb4','#56d4c8','#ff9f43','#a8ff78','#ffd700','#ff6b9d','#c0c0c0','#87ceeb','#dda0dd'];
const CERT_NAMES=['CDL','HEO Cert','Journeyman Electrician','Master Electrician','NEC Cert','CCM','PMP','CCO','EPA 608 Cert','HVAC Excellence Cert','Journeyman Plumber License','Master Plumber License','CW','CWI','CLC','MCAA'];
let charts={};
let filters={
  event:'ALL',
  excMin:0, excMax:100,
  jobInterest:new Set(),
  employment:new Set(),
  scoreSegs:new Set(),
  ageGroups:new Set(),
  gender:new Set(),
  states:new Set(),
  trivia:new Set(),
};
let showAllParticipants=false;
let tblSearch='';
// ═══════════════════════════════════════════════════════════
// FILE DETECTION
// ═══════════════════════════════════════════════════════════
function detectType(cols){
  const cs=cols.map(c=>c.toLowerCase());
  if(cs.some(c=>c.includes('total score')&&c.includes('safety')||c.includes('productivity score'))||cs.includes('safety score')) return 'exc';
  if(cs.some(c=>c.includes('trivia'))) return 'win';
  if(cs.some(c=>c.includes('first name'))||cs.some(c=>c.includes('mobile phone')&&c.includes('dob'))||cs.some(c=>c.includes('job status'))) return 'web';
  return null;
}
function handleFile(slot, input){
  const file=input.files[0]; if(!file) return;
  Papa.parse(file,{
    header:true, skipEmptyLines:true,
    complete(res){
      const cols=res.meta.fields||[];
      const type=detectType(cols);
      const statusEl=document.getElementById(`dz${slot}s`);
      const dzEl=document.getElementById(`dz${slot}`);
      if(!type){
        statusEl.style.color='var(--red)';
        statusEl.textContent='⚠ Unrecognized format';
        return;
      }
      if(type==='web') rawWeb=res.data;
      if(type==='exc') rawExc=res.data;
      if(type==='win') rawWin=res.data;
      dzEl.classList.add('loaded');
      statusEl.style.color='var(--green)';
      statusEl.textContent=`✓ ${type.toUpperCase()} — ${res.data.length} rows`;
      // count distinct loaded types
      const loaded=new Set();
      if(rawWeb.length) loaded.add('web');
      if(rawExc.length) loaded.add('exc');
      if(rawWin.length) loaded.add('win');
      if(loaded.size>=1) document.getElementById('loadBtn').classList.add('ready');
    }
  });
}
// Drag & drop
document.querySelectorAll('.drop-zone').forEach((dz,i)=>{
  dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over');});
  dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
  dz.addEventListener('drop',e=>{
    e.preventDefault();dz.classList.remove('drag-over');
    const fi=document.getElementById(`fi${i}`);
    const dt=new DataTransfer();dt.items.add(e.dataTransfer.files[0]);fi.files=dt.files;
    handleFile(i,fi);
  });
});

// ═══════════════════════════════════════════════════════════
// AUTO-LOAD SAMPLE DATA FROM GITHUB (NEW - ONLY ADDITION)
// ═══════════════════════════════════════════════════════════
async function loadSampleData() {
  const files = {
    web: 'data/web-registrations.csv',
    exc: 'data/excavator-simulator.csv',
    win: 'data/windows-trivia.csv'
  };

  try {
    // Load Web Registration
    let res = await fetch(files.web);
    if (res.ok) {
      const text = await res.text();
      Papa.parse(text, { header: true, skipEmptyLines: true, complete: r => { rawWeb = r.data || []; } });
    }

    // Load Excavator Simulator
    res = await fetch(files.exc);
    if (res.ok) {
      const text = await res.text();
      Papa.parse(text, { header: true, skipEmptyLines: true, complete: r => { rawExc = r.data || []; } });
    }

    // Load Windows Trivia
    res = await fetch(files.win);
    if (res.ok) {
      const text = await res.text();
      Papa.parse(text, { header: true, skipEmptyLines: true, complete: r => { rawWin = r.data || []; } });
    }

    // Give PapaParse a tiny moment to finish (CSVs are small)
    await new Promise(resolve => setTimeout(resolve, 800));

    if (rawWeb.length || rawExc.length || rawWin.length) {
      console.log(`✅ Preloaded sample data: ${rawWeb.length} web, ${rawExc.length} exc, ${rawWin.length} win`);
      // Auto-build dashboard exactly like the original Load button
      document.getElementById('uploadScreen').style.display = 'none';
      document.getElementById('appHeader').style.display = 'flex';
      document.getElementById('appLayout').style.display = 'flex';
      populateEventDropdown();
      buildSidebar();
      render();
    } else {
      throw new Error('No sample data');
    }
  } catch (err) {
    console.warn('Sample data not found — showing manual upload screen', err);
    // Upload screen stays visible (no changes to original behavior)
  }
}

// ═══════════════════════════════════════════════════════════
// BUILD DASHBOARD (original - unchanged)
// ═══════════════════════════════════════════════════════════
function buildDashboard(){
  document.getElementById('uploadScreen').style.display='none';
  document.getElementById('appHeader').style.display='flex';
  document.getElementById('appLayout').style.display='flex';
  populateEventDropdown();
  buildSidebar();
  render();
}
function reloadUpload(){
  rawWeb=[];rawExc=[];rawWin=[];
  document.getElementById('uploadScreen').style.display='flex';
  document.getElementById('appHeader').style.display='none';
  document.getElementById('appLayout').style.display='none';
  document.getElementById('loadBtn').classList.remove('ready');
  ['dz0s','dz1s','dz2s'].forEach(id=>{
    const el=document.getElementById(id);
    el.style.color='var(--muted)';el.textContent='No file loaded';
  });
  ['dz0','dz1','dz2'].forEach(id=>document.getElementById(id).classList.remove('loaded'));
}
// ═══════════════════════════════════════════════════════════
// HELPERS (original - unchanged)
// ═══════════════════════════════════════════════════════════
function getPhone(row,isExc){
  return isExc ? String(row['Login Code']||'').trim() : String(row['Mobile Phone']||'').trim();
}
function normalizePhone(p){
  return String(p||'').replace(/\D/g,'').replace(/^1/,'').slice(-10);
}
function getAge(dob){
  if(!dob) return null;
  const d=new Date(dob);
  if(isNaN(d)) return null;
  const now=new Date(2026,2,12);
  return Math.floor((now-d)/(365.25*86400000));
}
function ageGroup(age){
  if(!age||age<18) return null;
  const bins=[[18,20],[21,25],[26,30],[31,35],[36,40],[41,45],[46,50],[51,55],[56,60],[61,65],[66,70],[71,75],[76,80]];
  for(const [lo,hi] of bins) if(age>=lo&&age<=hi) return `${lo}-${hi}`;
  return '80+';
}
function excScoreSeg(score){
  if(score==null) return null;
  if(score<=10) return '0-10';
  if(score<=20) return '11-20';
  if(score<=30) return '21-30';
  if(score<=40) return '31-40';
  if(score<=50) return '41-50';
  if(score<=60) return '51-60';
  if(score<=70) return '61-70';
  if(score<=80) return '71-80';
  if(score<=90) return '81-90';
  return '91-100';
}
function getEvents(){
  const ev=new Set(['ALL']);
  [...rawWeb,...rawExc,...rawWin].forEach(r=>{
    const e=(r['Event Name']||'').trim();
    if(e) ev.add(e);
  });
  return [...ev];
}
function populateEventDropdown(){
  const sel=document.getElementById('eventSelect');
  sel.innerHTML='';
  getEvents().forEach(e=>{
    const o=document.createElement('option');
    o.value=e; o.textContent=e==='ALL'?'All Events':e;
    sel.appendChild(o);
  });
}
function onEventChange(){
  filters.event=document.getElementById('eventSelect').value;
  render();
}
// ═══════════════════════════════════════════════════════════
// FILTERING (original - unchanged)
// ═══════════════════════════════════════════════════════════
function filteredWeb(){
  return rawWeb.filter(r=>{
    if(filters.event!=='ALL'&&(r['Event Name']||'').trim()!==filters.event) return false;
    if(filters.employment.size>0){
      const emp=(r['Job Status']||'').trim();
      if(!filters.employment.has(emp)) return false;
    }
    if(filters.jobInterest.size>0){
      const ji=(r['Are you interested in new job opportunities in Construction/ trades?']||'').trim();
      if(!filters.jobInterest.has(ji)) return false;
    }
    if(filters.ageGroups.size>0){
      const ag=ageGroup(getAge(r['DOB']));
      if(!ag||!filters.ageGroups.has(ag)) return false;
    }
    if(filters.gender.size>0){
      const g=(r['Gender']||'').trim();
      if(!filters.gender.has(g)) return false;
    }
    if(filters.states.size>0){
      const s=(r['State']||'').trim();
      if(!filters.states.has(s)) return false;
    }
    return true;
  });
}
function filteredExc(){
  return rawExc.filter(r=>{
    if(filters.event!=='ALL'&&(r['Event Name']||'').trim()!==filters.event) return false;
    const score=parseFloat(r['Total Score']);
    if(!isNaN(score)){
      if(score<filters.excMin||score>filters.excMax) return false;
      if(filters.scoreSegs.size>0&&!filters.scoreSegs.has(excScoreSeg(score))) return false;
    }
    return true;
  });
}
function filteredWin(){
  return rawWin.filter(r=>{
    if(filters.event!=='ALL'&&(r['Event Name']||'').trim()!==filters.event) return false;
    if(filters.trivia.size>0){
      const TRIVIA_COLS={'Auto Mechanic':'Trivia Auto Mechanic Score','Civil Construction':'Trivia Civil Construction Score','Electrical':'Trivia Electrical Score','Plumbing':'Trivia Plumbing Score','Welding':'Trivia Welding Score','Construction Labor':'Trivia Construction Labor Score','HVAC':'Trivia HVAC Score','Warehouse':'Trivia Warehouse Score'};
      const took=[...filters.trivia].some(t=>{
        const col=TRIVIA_COLS[t];
        return col&&r[col]!==''&&r[col]!==null&&r[col]!==undefined&&!isNaN(parseFloat(r[col]));
      });
      if(!took) return false;
    }
    return true;
  });
}
function webMap(webRows){
  const m=new Map();
  webRows.forEach(r=>{ const p=normalizePhone(getPhone(r,false)); if(p) m.set(p,r); });
  return m;
}
function excMap(excRows){
  const m=new Map();
  excRows.forEach(r=>{ const p=normalizePhone(getPhone(r,true)); if(p){ if(!m.has(p)) m.set(p,r); else{ const existing=parseFloat(m.get(p)['Total Score'])||0; const cur=parseFloat(r['Total Score'])||0; if(cur>existing) m.set(p,r);} } });
  return m;
}
function winMap(winRows){
  const m=new Map();
  winRows.forEach(r=>{ const p=normalizePhone(r['Mobile Phone']||''); if(p) m.set(p,r); });
  return m;
}
function crossFilteredData(){
  const fW=filteredWeb();
  const fE=filteredExc();
  const fN=filteredWin();
  const hasWebFilter=filters.employment.size>0||filters.jobInterest.size>0||filters.ageGroups.size>0||filters.gender.size>0||filters.states.size>0;
  const hasExcFilter=(filters.excMin>0||filters.excMax<100||filters.scoreSegs.size>0);
  const hasWinFilter=filters.trivia.size>0;
  let webRows=fW, excRows=fE, winRows=fN;
  if(hasExcFilter){
    const excPhones=new Set(fE.map(r=>normalizePhone(getPhone(r,true))));
    webRows=webRows.filter(r=>excPhones.has(normalizePhone(getPhone(r,false))));
    winRows=winRows.filter(r=>excPhones.has(normalizePhone(r['Mobile Phone']||'')));
  }
  if(hasWebFilter){
    const webPhones=new Set(fW.map(r=>normalizePhone(getPhone(r,false))));
    excRows=excRows.filter(r=>webPhones.has(normalizePhone(getPhone(r,true))));
    winRows=winRows.filter(r=>webPhones.has(normalizePhone(r['Mobile Phone']||'')));
  }
  if(hasWinFilter){
    const winPhones=new Set(fN.map(r=>normalizePhone(r['Mobile Phone']||'')));
    webRows=webRows.filter(r=>winPhones.has(normalizePhone(getPhone(r,false))));
    excRows=excRows.filter(r=>winPhones.has(normalizePhone(getPhone(r,true))));
  }
  return {webRows,excRows,winRows};
}
// ═══════════════════════════════════════════════════════════
// SIDEBAR (original - unchanged)
// ═══════════════════════════════════════════════════════════
function buildSidebar(){
  buildChipFilter('fJI',['Yes','Maybe','No','No Answer'],'jobInterest');
  buildChipFilter('fEmp',['Currently employed in construction and/or a trade','Currently employed in another industry','Retired','Student','Unemployed and looking for work','Other'],
    'employment',{
      'Currently employed in construction and/or a trade':'Trades',
      'Currently employed in another industry':'Other Industry',
      'Retired':'Retired','Student':'Student',
      'Unemployed and looking for work':'Unemployed','Other':'Other'
    });
  buildChipFilter('fScore',['0-10','11-20','21-30','31-40','41-50','51-60','61-70','71-80','81-90','91-100'],'scoreSegs');
  const ages=rawWeb.map(r=>getAge(r['DOB'])).filter(Boolean).map(ageGroup).filter(Boolean);
  const ageSet=[...new Set(ages)].sort((a,b)=>parseInt(a)-parseInt(b));
  buildChipFilter('fAge',ageSet,'ageGroups');
  const genders=[...new Set(rawWeb.map(r=>(r['Gender']||'').trim()).filter(Boolean))];
  buildChipFilter('fGender',genders,'gender');
  const stateCounts={};
  rawWeb.forEach(r=>{ const s=(r['State']||'').trim(); if(s) stateCounts[s]=(stateCounts[s]||0)+1; });
  const top10=Object.entries(stateCounts).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([s])=>s);
  buildChipFilter('fState',top10,'states');
  buildChipFilter('fTrivia',['Auto Mechanic','Civil Construction','Electrical','Plumbing','Welding','Construction Labor','HVAC','Warehouse'],'trivia');
}
function buildChipFilter(containerId, options, filterKey, labelMap={}){
  const container=document.getElementById(containerId);
  container.innerHTML='';
  options.forEach(opt=>{
    const chip=document.createElement('button');
    chip.className='filter-chip';
    chip.textContent=labelMap[opt]||opt;
    chip.dataset.value=opt;
    chip.onclick=()=>{
      if(filters[filterKey] instanceof Set){
        if(filters[filterKey].has(opt)) filters[filterKey].delete(opt);
        else filters[filterKey].add(opt);
        chip.classList.toggle('active',filters[filterKey].has(opt));
      }
      updateActiveCount();
      render();
    };
    container.appendChild(chip);
  });
}
function onExcRange(){
  let mn=parseInt(document.getElementById('excMin').value);
  let mx=parseInt(document.getElementById('excMax').value);
  if(mn>mx){const t=mn;mn=mx;mx=t;}
  filters.excMin=mn; filters.excMax=mx;
  document.getElementById('excMinVal').textContent=mn;
  document.getElementById('excMaxVal').textContent=mx;
  updateActiveCount();
  render();
}
function updateActiveCount(){
  let n=0;
  if(filters.excMin>0||filters.excMax<100) n++;
  ['jobInterest','employment','scoreSegs','ageGroups','gender','states','trivia'].forEach(k=>{ if(filters[k].size>0) n+=filters[k].size; });
  const el=document.getElementById('activeCount');
  const btn=document.getElementById('clearFiltersBtn');
  el.textContent=n; el.style.display=n>0?'inline':'none';
  btn.style.display=n>0?'inline':'none';
}
function clearAllFilters(){
  filters.excMin=0; filters.excMax=100;
  document.getElementById('excMin').value=0;
  document.getElementById('excMax').value=100;
  document.getElementById('excMinVal').textContent=0;
  document.getElementById('excMaxVal').textContent=100;
  ['jobInterest','employment','scoreSegs','ageGroups','gender','states','trivia'].forEach(k=>filters[k].clear());
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  updateActiveCount();
  render();
}
// ═══════════════════════════════════════════════════════════
// RENDER (original - unchanged)
// ═══════════════════════════════════════════════════════════
function render(){
  const {webRows,excRows,winRows}=crossFilteredData();
  destroyCharts();
  renderKPIs(webRows,excRows,winRows);
  renderGrid(webRows,excRows,winRows);
}
function destroyCharts(){
  Object.values(charts).forEach(c=>{if(c)c.destroy();});
  charts={};
}
function renderKPIs(webRows,excRows,winRows){
  const ji=webRows.map(r=>(r['Are you interested in new job opportunities in Construction/ trades?']||'').trim());
  const hotLeads=ji.filter(v=>v==='Yes'||v==='Maybe').length;
  document.getElementById('kpiRow').innerHTML=`
    <div class="kpi-card">
      <div class="kpi-label">Registrations Shown</div>
      <div class="kpi-value">${webRows.length.toLocaleString()}</div>
      <div class="kpi-sub">of ${rawWeb.length} total</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">EXC Simulator Runs</div>
      <div class="kpi-value">${excRows.length.toLocaleString()}</div>
      <div class="kpi-sub">of ${rawExc.length} total</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Trivia Sessions</div>
      <div class="kpi-value">${winRows.length.toLocaleString()}</div>
      <div class="kpi-sub">of ${rawWin.length} total</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Yes/Maybe — Construction</div>
      <div class="kpi-value" style="color:var(--green)">${hotLeads.toLocaleString()}</div>
      <div class="kpi-sub">interested in opportunities</div>
    </div>
  `;
}
function renderGrid(webRows,excRows,winRows){
  document.getElementById('dashGrid').innerHTML=`
    <div class="card" id="cExcDist">
      <div class="card-title"><span class="dot"></span>EXC Score Distribution <span class="filter-active-badge" id="badgeExc">FILTERED</span></div>
      <div class="chart-wrap chart-clickable"><canvas id="chartExc"></canvas></div>
    </div>
    <div class="card" id="cEmp">
      <div class="card-title"><span class="dot"></span>Employment Status <span class="filter-active-badge" id="badgeEmp">FILTERED</span></div>
      <div class="chart-wrap chart-clickable"><canvas id="chartEmp"></canvas></div>
    </div>
    <div class="card" id="cJI">
      <div class="card-title"><span class="dot"></span>Interest in Construction Jobs <span class="filter-active-badge" id="badgeJI">FILTERED</span></div>
      <div class="chart-wrap chart-clickable"><canvas id="chartJI"></canvas></div>
    </div>
    <div class="card wide" id="cAge">
      <div class="card-title"><span class="dot"></span>Age Distribution <span class="filter-active-badge" id="badgeAge">FILTERED</span></div>
      <div class="chart-wrap chart-clickable"><canvas id="chartAge"></canvas></div>
    </div>
    <div class="card" id="cCerts">
      <div class="card-title"><span class="dot"></span>Trade Certifications &amp; Licenses</div>
      <div class="chart-wrap"><canvas id="chartCerts"></canvas></div>
    </div>
    <div class="card" id="cStates">
      <div class="card-title"><span class="dot"></span>Participants by State <span class="filter-active-badge" id="badgeState">FILTERED</span></div>
      <div class="state-grid" id="stateGrid"></div>
    </div>
    <div class="card wide" id="cTrivia">
      <div class="card-title"><span class="dot"></span>Windows Trivia — Tests Taken &amp; Avg Scores <span class="filter-active-badge" id="badgeTrivia">FILTERED</span></div>
      <table class="ttbl"><thead><tr><th>Test</th><th>Participants</th><th>Avg Score</th><th>Bar</th></tr></thead><tbody id="triviaBody"></tbody></table>
    </div>
    <div class="card full" id="cParticipants">
      <div class="card-title"><span class="dot"></span>Filtered Participants</div>
      <div class="tbl-toolbar">
        <button class="tbl-toggle" id="showAllToggle" onclick="toggleShowAll()">Show Unmatched</button>
        <input class="tbl-search" type="text" placeholder="Search name / phone…" oninput="tblSearch=this.value;renderTable(webRows2,excRows2,winRows2)" id="tblSearchInput">
        <div class="tbl-count" id="tblCount"></div>
      </div>
      <div class="table-scroll"><table class="ptbl"><thead><tr>
        <th>#</th><th>Name</th><th>Phone</th><th>Address</th><th>State</th><th>Event</th>
        <th>EXC Score</th><th>Trivia Tests (Avg)</th><th>Job Interest</th>
      </tr></thead><tbody id="ptblBody"></tbody></table></div>
    </div>
  `;
  if(filters.scoreSegs.size>0||filters.excMin>0||filters.excMax<100) document.getElementById('badgeExc').style.display='inline';
  if(filters.employment.size>0) document.getElementById('badgeEmp').style.display='inline';
  if(filters.jobInterest.size>0) document.getElementById('badgeJI').style.display='inline';
  if(filters.ageGroups.size>0) document.getElementById('badgeAge').style.display='inline';
  if(filters.states.size>0) document.getElementById('badgeState').style.display='inline';
  if(filters.trivia.size>0) document.getElementById('badgeTrivia').style.display='inline';
  const co={responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8b949e',font:{family:'Barlow Condensed',size:11,weight:'600'},padding:10}}}};
  const scoreBuckets={};
  ['0-10','11-20','21-30','31-40','41-50','51-60','61-70','71-80','81-90','91-100'].forEach(b=>scoreBuckets[b]=0);
  excRows.forEach(r=>{const s=parseFloat(r['Total Score']);if(!isNaN(s)){const seg=excScoreSeg(s);if(seg)scoreBuckets[seg]++;}});
  const sdK=Object.keys(scoreBuckets).filter(k=>scoreBuckets[k]>0);
  const sdV=sdK.map(k=>scoreBuckets[k]);
  charts.exc=new Chart(document.getElementById('chartExc'),{
    type:'pie',
    data:{labels:sdK.map(k=>`Score ${k}`),datasets:[{data:sdV,backgroundColor:PIE_PALETTE.slice(0,sdV.length),borderColor:'#161b22',borderWidth:2}]},
    options:{...co,onClick:(evt,els)=>{if(!els.length)return;const seg=sdK[els[0].index];toggleFilter('scoreSegs',seg);}}
  });
  const empMap={};
  const empShort={'Currently employed in construction and/or a trade':'In Trades','Currently employed in another industry':'Other Industry','Retired':'Retired','Other':'Other','Student':'Student','Unemployed and looking for work':'Unemployed'};
  webRows.forEach(r=>{const e=(r['Job Status']||'').trim();if(e)empMap[e]=(empMap[e]||0)+1;});
  const empK=Object.keys(empMap);const empV=empK.map(k=>empMap[k]);
  charts.emp=new Chart(document.getElementById('chartEmp'),{
    type:'pie',
    data:{labels:empK.map(k=>empShort[k]||k),datasets:[{data:empV,backgroundColor:PIE_PALETTE.slice(0,empV.length),borderColor:'#161b22',borderWidth:2}]},
    options:{...co,onClick:(evt,els)=>{if(!els.length)return;const seg=empK[els[0].index];toggleFilter('employment',seg);}}
  });
  const jiMap={};
  webRows.forEach(r=>{const v=(r['Are you interested in new job opportunities in Construction/ trades?']||'').trim()||'No Answer';jiMap[v]=(jiMap[v]||0)+1;});
  const jiColors={'Yes':'#3fb950','Maybe':'#f0a500','No':'#f85149','No Answer':'#8b949e'};
  const jiK=Object.keys(jiMap);const jiV=jiK.map(k=>jiMap[k]);
  charts.ji=new Chart(document.getElementById('chartJI'),{
    type:'pie',
    data:{labels:jiK,datasets:[{data:jiV,backgroundColor:jiK.map(k=>jiColors[k]||'#8b949e'),borderColor:'#161b22',borderWidth:2}]},
    options:{...co,onClick:(evt,els)=>{if(!els.length)return;const seg=jiK[els[0].index];toggleFilter('jobInterest',seg);}}
  });
  const ageBins=['18-20','21-25','26-30','31-35','36-40','41-45','46-50','51-55','56-60','61-65','66-70','71-75','76-80','80+'];
  const ageCounts={};ageBins.forEach(b=>ageCounts[b]=0);
  webRows.forEach(r=>{const a=getAge(r['DOB']);const g=ageGroup(a);if(g&&ageCounts[g]!==undefined)ageCounts[g]++;});
  const ahK=ageBins.filter(b=>ageCounts[b]>0);
  const ahV=ahK.map(b=>ageCounts[b]);
  charts.age=new Chart(document.getElementById('chartAge'),{
    type:'bar',
    data:{labels:ahK,datasets:[{label:'Participants',data:ahV,backgroundColor:ahV.map((_,i)=>{const t=i/ahV.length;return `rgba(240,${Math.round(165*(1-t)+88*t)},${Math.round(t*4)},0.85)`;}),borderColor:'transparent',borderRadius:3}]},
    options:{...co,plugins:{...co.plugins,legend:{display:false}},scales:{x:{ticks:{color:'#8b949e',font:{family:'Barlow Condensed',size:10}},grid:{color:'#21262d'}},y:{ticks:{color:'#8b949e',font:{family:'Barlow Condensed',size:10}},grid:{color:'#21262d'}}},
      onClick:(evt,els)=>{if(!els.length)return;const seg=ahK[els[0].index];toggleFilter('ageGroups',seg);}
    }
  });
  const certColNames=['Trade Certifications or Licenses','Trade Certifications or Licenses.1','Trade Certifications or Licenses.2','Trade Certifications or Licenses.3','Trade Certifications or Licenses.4','Trade Certifications or Licenses.5','Trade Certifications or Licenses.6','Trade Certifications or Licenses.7','Trade Certifications or Licenses.8','Trade Certifications or Licenses.9','Trade Certifications or Licenses.10','Trade Certifications or Licenses.11','Trade Certifications or Licenses.12','Trade Certifications or Licenses.13','Trade Certifications or Licenses.14','Trade Certifications or Licenses.15'];
  const certCounts=CERT_NAMES.map((name,i)=>{const col=certColNames[i];return{name,count:webRows.filter(r=>r[col]==='Yes').length};});
  const certFiltered=certCounts.filter(c=>c.count>0).sort((a,b)=>b.count-a.count);
  charts.certs=new Chart(document.getElementById('chartCerts'),{
    type:'bar',
    data:{labels:certFiltered.map(c=>c.name),datasets:[{label:'Holders',data:certFiltered.map(c=>c.count),backgroundColor:certFiltered.map((_,i)=>PIE_PALETTE[i%PIE_PALETTE.length]+'cc'),borderColor:'transparent',borderRadius:3}]},
    options:{...co,indexAxis:'y',plugins:{...co.plugins,legend:{display:false}},scales:{x:{ticks:{color:'#8b949e',font:{family:'Barlow Condensed',size:10}},grid:{color:'#21262d'}},y:{ticks:{color:'#e6edf3',font:{family:'Barlow Condensed',size:11,weight:'600'}},grid:{color:'#21262d'}}}}
  });
  const stateC={};
  webRows.forEach(r=>{const s=(r['State']||'').trim();if(s)stateC[s]=(stateC[s]||0)+1;});
  const stateGrid=document.getElementById('stateGrid');
  stateGrid.innerHTML=Object.entries(stateC).sort((a,b)=>b[1]-a[1]).map(([s,c])=>`
    <div class="state-row" style="${filters.states.has(s)?'border-left-color:var(--accent)':''}" onclick="toggleFilter('states','${s}')">
      <span class="state-name">${s}</span><span class="state-count">${c}</span>
    </div>`).join('');
  const TRIVIA_COLS={'Auto Mechanic':'Trivia Auto Mechanic Score','Civil Construction':'Trivia Civil Construction Score','Electrical':'Trivia Electrical Score','Plumbing':'Trivia Plumbing Score','Welding':'Trivia Welding Score','Construction Labor':'Trivia Construction Labor Score','HVAC':'Trivia HVAC Score','Warehouse':'Trivia Warehouse Score'};
  const triviaData=Object.entries(TRIVIA_COLS).map(([name,col])=>{
    const vals=winRows.map(r=>parseFloat(r[col])).filter(v=>!isNaN(v));
    return{name,count:vals.length,avg:vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0};
  }).sort((a,b)=>b.count-a.count);
  const maxAvg=Math.max(...triviaData.map(d=>d.avg),1);
  document.getElementById('triviaBody').innerHTML=triviaData.filter(d=>d.count>0).map(d=>`
    <tr style="cursor:pointer" onclick="toggleFilter('trivia','${d.name}')">
      <td class="ttest" style="${filters.trivia.has(d.name)?'color:var(--accent)':''}">${d.name}</td>
      <td class="tcount">${d.count.toLocaleString()}</td>
      <td class="tavg">${d.avg.toFixed(1)}</td>
      <td><div class="mini-bar-bg"><div class="mini-bar-fill" style="width:${(d.avg/maxAvg*100).toFixed(1)}%"></div></div></td>
    </tr>`).join('');
  window.webRows2=webRows; window.excRows2=excRows; window.winRows2=winRows;
  renderTable(webRows,excRows,winRows);
}
function renderTable(webRows,excRows,winRows){
  const eMap=excMap(excRows);
  const wMap=webMap(webRows);
  const nMap=winMap(winRows);
  const TRIVIA_COLS={'Auto Mechanic':'Trivia Auto Mechanic Score','Civil Construction':'Trivia Civil Construction Score','Electrical':'Trivia Electrical Score','Plumbing':'Trivia Plumbing Score','Welding':'Trivia Welding Score','Construction Labor':'Trivia Construction Labor Score','HVAC':'Trivia HVAC Score','Warehouse':'Trivia Warehouse Score'};
  const allPhones=new Set();
  webRows.forEach(r=>allPhones.add(normalizePhone(getPhone(r,false))));
  excRows.forEach(r=>allPhones.add(normalizePhone(getPhone(r,true))));
  winRows.forEach(r=>allPhones.add(normalizePhone(r['Mobile Phone']||'')));
  let rows=[];
  allPhones.forEach(phone=>{
    if(!phone) return;
    const w=wMap.get(phone);
    const e=eMap.get(phone);
    const n=nMap.get(phone);
    if(!showAllParticipants&&!w) return;
    const firstName=w?w['First Name']:'';
    const lastName=w?w['Last Name']:'';
    const name=`${firstName} ${lastName}`.trim()||'—';
    const addr=w?((w['Street Address']||'').trim()||''):'';
    const state=w?(w['State']||'').trim():'';
    const event=w?(w['Event Name']||'').trim():e?(e['Event Name']||'').trim():n?(n['Event Name']||'').trim():'';
    const excScore=e?parseFloat(e['Total Score']):null;
    const ji=w?(w['Are you interested in new job opportunities in Construction/ trades?']||'').trim():'';
    let triviaStr='—';
    if(n){
      const taken=Object.entries(TRIVIA_COLS).filter(([nm,col])=>n[col]!==''&&n[col]!==null&&n[col]!==undefined&&!isNaN(parseFloat(n[col])));
      if(taken.length){
        const scores=taken.map(([nm,col])=>parseFloat(n[col]));
        const avg=(scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1);
        triviaStr=taken.map(([nm])=>nm).join(', ')+` (avg ${avg})`;
      }
    }
    rows.push({phone,name,addr,state,event,excScore,trivia:triviaStr,ji});
  });
  const q=tblSearch.toLowerCase();
  if(q) rows=rows.filter(r=>r.name.toLowerCase().includes(q)||r.phone.includes(q));
  rows.sort((a,b)=>{
    if(a.excScore==null&&b.excScore==null) return 0;
    if(a.excScore==null) return 1; if(b.excScore==null) return -1;
    return b.excScore-a.excScore;
  });
  document.getElementById('tblCount').textContent=`${rows.length.toLocaleString()} participants`;
  const tbody=document.getElementById('ptblBody');
  if(!rows.length){tbody.innerHTML=`<tr><td colspan="9" class="no-data">No participants match the current filters.</td></tr>`;return;}
  tbody.innerHTML=rows.map((r,i)=>{
    const scoreBadge=r.excScore==null
      ?`<span class="score-badge dnc">DNC</span>`
      :`<span class="score-badge ${r.excScore>=72?'hi':''}">${r.excScore.toFixed(0)}</span>`;
    const jiPill=r.ji==='Yes'?`<span class="ip-yes">Yes</span>`:r.ji==='Maybe'?`<span class="ip-maybe">Maybe</span>`:r.ji==='No'?`<span class="ip-no">No</span>`:`<span class="ip-na">N/A</span>`;
    return `<tr>
      <td class="fmuted">${i+1}</td>
      <td class="fname">${r.name}</td>
      <td class="fmuted">${r.phone}</td>
      <td style="font-size:12px;color:var(--muted);max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.addr}</td>
      <td style="font-family:'Barlow Condensed',sans-serif;font-weight:700">${r.state}</td>
      <td style="font-size:12px;color:var(--muted);white-space:nowrap">${r.event}</td>
      <td>${scoreBadge}</td>
      <td style="font-size:11px;color:var(--muted);max-width:200px">${r.trivia}</td>
      <td>${jiPill}</td>
    </tr>`;
  }).join('');
}
function toggleFilter(key, value){
  if(filters[key] instanceof Set){
    if(filters[key].has(value)) filters[key].delete(value);
    else filters[key].add(value);
    document.querySelectorAll('.filter-chip').forEach(c=>{
      if(c.dataset.value===value) c.classList.toggle('active',filters[key].has(value));
    });
  }
  updateActiveCount();
  render();
}
function toggleShowAll(){
  showAllParticipants=!showAllParticipants;
  const btn=document.getElementById('showAllToggle');
  if(btn){btn.classList.toggle('on',showAllParticipants);btn.textContent=showAllParticipants?'Hide Unmatched':'Show Unmatched';}
  if(window.webRows2) renderTable(window.webRows2,window.excRows2,window.winRows2);
}

// Force auto-load immediately
setTimeout(() => {
  if (rawWeb.length === 0 && rawExc.length === 0 && rawWin.length === 0) {
    loadSampleData();
  }
}, 500);
</script>
